spring.application.name=CodeLens
server.port=8081

# Where repos will be cloned / analyzed
app.ingestion.work-dir=codelens_data/repos

# Gemini configuration
gemini.api.key=${GEMINI_API_KEY}
gemini.base-url=https://generativelanguage.googleapis.com/v1beta/models
gemini.model.chat=gemini-2.0-flash
gemini.model.embedding=text-embedding-004

# Elasticsearch configuration
spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.connection-timeout=5s
spring.elasticsearch.socket-timeout=60s

# CodeLens search index (matches @Document on CodeEntityDoc)
codelens.search.index-name=code-entities
